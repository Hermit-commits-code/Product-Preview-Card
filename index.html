<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor | Product Preview Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
      integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <section class="left">
          <img src="images/image-product-desktop.jpg" alt="perfume bottle with leaves">
        </section>
        <section class="right">
          <h2>perfume</h2>
          <h1>Gabrielle
            Essence Eau
            De Parfum</h1>
          <p class="description">
            A floral, solar and voluptous interpretation composed by Olivier Polge, Perfumer-Creator for the House of
            CHANEL.
          </p>
          <section class="price-section">
            <h1>$149.99</h1>
            <h3><del>$169.99</del></h3>
          </section>
          <button type="button"><i class="fa-solid fa-cart-shopping"></i> Add to Cart</button>
        </section>
      </div>
    </div>
  </body>

</html>
